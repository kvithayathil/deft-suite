name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check third-party notices are up to date
        run: npm run check:notices

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  test:
    name: Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          files: coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # --- Gist-backed dynamic badge (disabled) ---
      # To enable: create a secret gist, set COVERAGE_GIST_ID and GIST_TOKEN secrets,
      # and uncomment both steps below.
      # - name: Extract coverage summary
      #   id: coverage-summary
      #   if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22 && github.ref == 'refs/heads/main'
      #   run: |
      #     LINES=$(node -e "const s=require('./coverage/coverage-summary.json');console.log(s.total.lines.pct)")
      #     echo "lines=$LINES" >> "$GITHUB_OUTPUT"
      # - name: Update coverage badge (gist)
      #   if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22 && github.ref == 'refs/heads/main'
      #   uses: schneegans/dynamic-badges-action@v1.7.0
      #   with:
      #     auth: ${{ secrets.GIST_TOKEN }}
      #     gistID: ${{ secrets.COVERAGE_GIST_ID }}
      #     filename: coverage-badge.json
      #     label: coverage
      #     message: ${{ steps.coverage-summary.outputs.lines }}%
      #     valColorRange: ${{ steps.coverage-summary.outputs.lines }}
      #     minColorRange: 50
      #     maxColorRange: 90
      #     namedLogo: vitest

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check schema and docs are up to date
        run: npm run check:schema

      - name: Verify dist output exists
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          test -f dist/cli.js || (echo "dist/cli.js not found" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
